# Non-secret configuration ONLY. Secrets (tokens, keys) live in the macOS Keychain or
# environment and are never read from here, never committed, never passed to a model
# (Invariant 10, CONVENTIONS). Relative paths resolve against the repo root.

[ollama]
# The sealed core talks to a LOCAL Ollama over loopback only (BUILD-SPEC §5, §7); the
# egress guard permits this and blocks everything else.
host = "127.0.0.1"
port = 11434
default_keep_alive = "30m"   # seconds a worker stays warm after last use
# Two timeouts by operation class. Control-plane ops (health/load/embed/evict) should fail fast;
# a chat GENERATION by a large thinking-model tier (synthesis/stretch) legitimately runs minutes
# — a real 27b synthesis pass was measured at ~290s. One uniform timeout is wrong in both
# directions. Job-level liveness (a pass that never returns) is the supervisor's concern, above
# the socket layer, so a generous generation timeout here is safe.
request_timeout_s = 120
generation_timeout_s = 600

[resources]
# Apple Silicon M2 Max, 32 GB unified memory; ~20-24 GB usable after OS + working set
# (BUILD-SPEC §5). The loader refuses work that would breach this (Invariant 8). 24 is
# the hard upper ceiling: the stretch model deliberately consumes most of it and evicts
# the pinned model for its duration. `resident_gb` below is the weights footprint;
# KV-cache (bounded per role by num_ctx) is additional headroom, accounted as a
# refinement in a later phase.
usable_ram_gb = 24.0
max_resident_models = 2

[paths]
data_dir = "data"
telemetry_db = "data/telemetry.duckdb"
raw_store = "data/raw"            # content-addressed immutable raw notes (§8)
vector_store = "data/vectors.lance"  # LanceDB thought-graph vectors (derived, regenerable)
derived_store = "data/derived.sqlite"  # INTERPRETED artifacts: dreams + curator findings (§8)
vault_catalog = "data/vault_catalog.sqlite"  # active/tombstone ledger for incremental ingest
attestation_store = "data/attestations.sqlite"  # append-only attestation records (runtime proof)
# The CURATED literature store — embedded open-access full text (dn-external-grounding §2.2/§2.4).
# A SEPARATE LanceDB from vector_store; provenance CURATED never merges into the authored mirror.
# Under data/ + *.lance/ → gitignored by construction (Inv 11: the full text never enters git).
curated_store = "data/research_curated.lance"

[vault]
# The SOURCE corpus the system ingests FROM — read-only, AUTHORED, never committed.
# `~` expands to $HOME. Point at a Logseq/Obsidian markdown vault, or export notes here.
# (§20.8: narrow `pattern`, or point `path` at a subgraph, to scope which notes ingest.)
path = "~/.mind-palace/vault"
pattern = "**/*.md"
# Local watcher (core-side, filesystem only — no network). On change → a background
# `vault_sync` job re-ingests through the Phase-1 pipeline (idempotent via content-addressing).
# `watchdog` gives real-time FSEvents; without it the watcher falls back to polling at
# `watch_poll_interval_s`. `watch_debounce_s` coalesces a burst of saves into one re-ingest.
watch_debounce_s = 1.0
watch_poll_interval_s = 5.0

[exhaust]
# The OUTBOUND lane (dn-exhaust-lane): system-emitted artifacts the owner reads on his phone
# (Files-app shortcut), starting with delegated-build reports under `reports/`. A SEPARATE
# Syncthing share, sibling to [vault] — NOT a subdirectory of it. `~` expands to $HOME.
# Single source of truth: the report writer and the ingest-invariant test both read this root.
# NEVER an ingest/source root (note §2.2): no core/ingest path may read from here — reports
# describe the system, and ingesting them would be recursive self-ingestion of meta-content.
# NOTE (finding-0115): surfacing this table through `get_config()` needs an `ExhaustConfig` in
# `core/config/loader.py` (the loader is schema'd, not a passthrough) — out of bp-075's
# write_scope. Until that lands this key is inert (parsed into `raw`, dropped by `load_config`).
path = "~/.mind-palace/exhaust"   # system-written, owner-read

[planes]
# The four-plane principal model (dn-plane-principals §3.1). Role-account HOMES for the three
# hidden service users (never GUI-login; owner-created via sysadminctl/dscl per the migration
# runbook). These keys are consumed by scripts/verify_planes.py + the tests/unit/test_plane_migration.py
# ratchets — NOT by get_config(): core/config/loader.py is schema'd and drops unknown sections, so
# there is deliberately no PlanesConfig; the verifier/ratchets read this block via a direct tomllib
# parse (with the local.toml overlay honored). `enabled` is the COARSE master switch for the
# per-plane ratchets; the PRIMARY signal is self-configuring on real ownership (stat().st_uid), so
# a lane migrates its own ratchet from skip→enforce with no manual flip — this flag just lets the
# owner force-disable the whole set mid-migration if needed. It stays false until the migration is
# complete (flip it in config/local.toml, not here).
core_home = "/var/ouroboros"            # ouroboros:      the reasoning daemon + the vault
work_home = "/var/ouroboros-work"       # ouroboros-work: the orchestrator + delegated builders
edge_home = "/var/ouroboros-edge"       # ouroboros-edge: network-facing (forward-provisioned; §9)
enabled = false                          # false until the owner completes the migration

[chat]
# The dialogue sensor over the local Claude Code transcripts (bp-069). Growth-aware + real-time:
# a live DirectoryWatcher (core-side, filesystem only — no network) enqueues a background
# `chat_sync` on every transcript change, so a session left open ingests its tail immediately
# (finding-0109 — freeze-once removed). `transcripts_dir` is the finding-0108 G1 OVERRIDE: leave
# unset to use the resolved default (~/.claude/projects/<repo-slug>); set it only when the
# canonical repo path differs from a worktree's.
# transcripts_dir = "~/.claude/projects/-Users-you-mind-palace"
watch_debounce_s = 0.5          # coalesce one turn's write into one re-ingest ("immediate", Q4)
watch_poll_interval_s = 5.0     # fallback cadence when watchdog isn't available
events_max_per_pass = 50        # L1 action-log projector cap per pass (Item 3)
integrate_max_per_pass = 50     # integrator proven-edge pass cap per tick (bp-071 Item 2)

[embedding]
# Embedding quality is load-bearing (retrieval, dreaming, matching) — owner chose the
# higher-quality tier. Dimension is read here so re-embedding from raw (§8) on a model
# change is a config edit, not a rewrite.
model = "qwen3-embedding:4b"
dim = 2560
# Qwen3-Embedding is instruction-aware on the QUERY side; documents embed plain.
query_instruction = "Given a question, retrieve the owner's notes relevant to it"

# --- Model lineup: two-slot discipline (BUILD-SPEC §5); §20.1 resolved 2026-06-25. ---
# Personas and per-call params are injected at REQUEST time via the Ollama API, never
# baked into a Modelfile (CONVENTIONS). `num_ctx` is the per-role load-time window,
# right-sized per role rather than the model's 256K max (BUILD-SPEC §13).

[[models]]
name = "qwen3.5:2b"          # Slot 1 — pinned, always warm: router + watchdog
tier = "router"              # default tag is the q8 build (~2.7 GB); the q4_K_M tag
pinned = true                # (~1.9 GB) is a later memory optimization if needed
resident_gb = 2.7
num_ctx = 8192

[[models]]
name = "qwen3.5:9b"          # Slot 2 — foreground RAG + fast conversational (voice)
tier = "routine"
pinned = false
resident_gb = 6.6
num_ctx = 16384

[[models]]
name = "qwen3.6:27b"         # Slot 2 — curation/dreaming/research synthesis (cron/idle)
tier = "synthesis"
pinned = false
resident_gb = 17.0
num_ctx = 32768

[[models]]
name = "qwen3.6:35b-a3b"     # Slot 2 — rare deep synthesis; EVICTS the pinned model
tier = "stretch"
pinned = false
resident_gb = 23.0
num_ctx = 32768
evicts_pinned = true

[interface]
# Zone B gateway <-> sealed core handoff (BUILD-SPEC §6, §12). The ONLY channel between the
# networked gateway and the core is this filesystem directory — never shared memory or
# imports (Invariant 2). The private default adapter is the local app over Tailscale;
# third-party adapters (e.g. WhatsApp) leak interactions and are opt-in (Invariant 11).
handoff_dir = "data/handoff"
default_adapter = "local"

[ambassador]
# The conversational front door (Track B; ambassador-as-reasoning-agent.md). Runs on the pinned
# tier (always warm). These are judgment BOUNDS, not behavior switches:
#   retrieval_k             — cap on per-turn retrieval depth (the §13 budgeter enforces the
#                             window regardless; this just bounds what the agent may pull).
#   history_max_turns       — cheap in-memory working context kept per conversation; older
#                             context is RE-retrieved from the authored-dialogue corpus (no
#                             double-storage of the thread — note §2).
#   interruption_sensitivity — the unprompted-message dial: off | earned_only | verbose.
#                             Default earned_only ("not a silent oracle, not a nag" — note §3).
retrieval_k = 5
history_max_turns = 6
interruption_sensitivity = "earned_only"

[effectors]
# Track G — the hands / effector layer (docs/design-notes/hands-and-the-effector-layer.md).
# SENSING-ONLY
# (β = 0): read-only hands; the acting classes (reversible/irreversible) are not built and the
# types refuse them (EffectView ceiling ε = 0). OFF by default and fail-closed everywhere:
# with `enabled = false` the core-side handoff and the edge effector both refuse to build, and
# with `[effectors.upstreams]` EMPTY every fetch is refused even when enabled. A request
# carries only a NAME into the upstreams table — the core-side type has no field that can hold
# a URL, so the hand can only be aimed at entries the owner wrote here (reviewed allowlist).
enabled = false
handoff_dir = "data/handoff/sensing"
timeout_s = 20.0            # per-fetch socket timeout (edge-side)
max_response_kb = 512       # oversize responses are REFUSED, not truncated
# Acting classes (G5/G6) — BUILT but unreachable until ε is raised past sensing (the wired surface
# admits at ceiling SENSING). These knobs are inert while the classes are off:
ledger_db = "data/effectors/effects.sqlite"   # durable propose→approve→execute→validate/rollback
drafts_dir = "data/effectors/drafts"          # where a reversible write (class 2) stages its draft
jit_credential_ttl = "60s"                     # short TTL of the per-action send credential (class 3)

[effectors.upstreams]
# name = "https://..."  — the edge-side reviewed allowlist (https only; enforced at use).
# e.g.:  open-meteo = "https://api.open-meteo.com/v1/forecast?latitude=42.36&longitude=-71.06"

[airlock]
# The research airlock (BUILD-SPEC §16, Invariant 11). The sealed core (Zone A) reads/writes
# ONLY `handoff_dir` — a filesystem handoff like [interface]. It has no S3 and no network.
# The de-identified criteria go out; public literature comes back; the corpus never crosses.
handoff_dir = "data/airlock"
# --- Zone B (the bridge) ONLY. The sealed core never reads these (it cannot reach S3). ---
# Populate `s3_bucket` after `terraform apply` (output `airlock_bucket`). `aws_profile` is a
# narrowly-scoped assumed role (cloud/terraform/airlock provisions it) — least privilege, the
# bridge can PUT requests/ and GET results/ and nothing else.
s3_bucket = ""
s3_region = "us-east-1"
aws_profile = "mind-palace-bridge"
requests_prefix = "requests/"
results_prefix = "results/"
poll_interval_s = 5          # how often the bridge polls S3 results/ for a finished job
poll_timeout_s = 900         # give up waiting on the fetcher after this long

[attestation]
# The runtime proof layer (design-notes/attestation-layer.md; core/attestation/). Records are
# always written (chained, content-addressed); SIGNING is owner-gated by `enabled`.
# OFF by default: records-only until the owner generates Ed25519 keys and places the private
# seed in Keychain/Vault (ops/attestation/README.md + the runbook). Turning `enabled` on without
# a placed key is a HARD ERROR (fail-closed) — never a silent unsigned run.
enabled = false
signing_key_secret = "attestation-signing-key"    # env/Keychain name of the supervisor seed (base64)
owner_key_secret = "attestation-owner-key"          # env/Keychain name of the owner seed (gate decisions)
supervisor_pub = "ops/attestation/supervisor.pub"   # committed public key (non-secret), agent attestations
owner_pub = "ops/attestation/owner.pub"             # committed public key, gate-decision attestations

[secrets]
# Vault as a per-interaction runtime authorization layer (design-notes/vault-runtime-auth.md).
# OFF by default: `get_secret(name)` with no token keeps reading env/Keychain unchanged either
# way — `enabled` only gates whether a real VaultClient gets wired for `mint_token`/scoped
# reads. Dev-mode Vault runs on loopback (already inside the egress guard, Invariant 1).
enabled = false
addr = "http://127.0.0.1:8200"
kv_mount = "kv"          # kv-v2 mount point for static secrets
aws_mount = "aws"        # dynamic AWS secrets engine mount point (bridge/airlock roles)
# Agent roles minted WITH an ephemeral scoped credential grant (§2 lifecycle). FAIL-CLOSED EMPTY:
# a minted agent gets a Vault token only if its role is listed here AND `enabled = true`. Grant
# the minimum and opt in per role in local.toml — recommended set (vault-runtime-auth.md §3):
#   grant_roles = ["correlator", "advisor"]
grant_roles = []
token_ttl = "10m"        # short TTL — the per-interaction grant expires on its own

[backup]
# restic → S3 encrypted backups (BUILD-SPEC §16b). restic encrypts + deduplicates CLIENT-SIDE, so
# AWS never sees plaintext; the bucket's SSE-KMS is defense in depth. OFF by default — enable per
# machine via config/local.toml after `cloud/terraform/backups` is applied and the restic password
# + backup AWS key are placed in Keychain. The repo password and AWS key are NEVER stored here.
enabled = false
repository = ""          # terraform output restic_repository (s3:s3.<region>.amazonaws.com/<bucket>)
password_secret = "restic-password"                  # Keychain item: the repo encryption password
aws_access_key_id_secret = "backup-aws-access-key-id"
aws_secret_access_key_secret = "backup-aws-secret-access-key"
region = "us-east-1"
vault_snapshot = true    # also capture a consistent `vault operator raft snapshot` (full DR)
exclude = ["logs", "queue.sqlite", "queue.sqlite-wal", "queue.sqlite-shm", "*-shm", "*.lock", ".DS_Store"]
keep_daily = 7
keep_weekly = 4
keep_monthly = 6

[dreaming]
# Curator + dreaming knobs (BUILD-SPEC §9). Clustering is deterministic (NumPy cosine over
# note centroids), so these thresholds fully determine a run. They are the tunables a future
# safe-lever (§14) could right-size; conservative defaults for a personal corpus.
#
# `similarity_threshold` IS σ — the thought-graph edge threshold E_sim = {(u,v): cos ≥ σ}
# (WHITEPAPER-TECHNICAL §graph). BOUND (gap G7): σ ∈ [0.55, 0.75] for this embedder — high
# enough that a "theme" is genuine semantic kinship, not topical drift; low enough that real
# themes still connect. 0.62 is the conservative default; calibrate on the owner's own corpus
# (the right σ is corpus- and embedder-specific) before trusting cluster boundaries.
similarity_threshold = 0.62   # σ: cosine >= this joins two notes into a theme cluster
min_cluster_size = 2          # a theme needs at least this many notes
max_clusters = 8              # cap syntheses per dream run (the inference slot is scarce, §5)
# A much tighter σ: near-identical, not merely related. BOUND: ≥ 0.90 so a merge candidate is
# a true duplicate, never two distinct notes on one topic.
near_dup_threshold = 0.93     # cosine >= this flags two authored notes as a merge candidate

[dream_rnd]
# Dream-phase R&D track (docs/design-notes/dream-phase-rnd-charter.md) — the interpreter panel
# (R0) + evidence-based adjudicator (R1). FEATURE-FLAG OFF by default and NOT wired into the
# live dream path: scheduler/cron.py still runs the Phase-7 Dreamer. The R0/R1 entry points
# REFUSE to run unless `enabled = true` (core/dreaming/rnd.py), so this never runs in a normal
# session — flip it on only inside a deliberate R&D run.
enabled = false
sigma = 0.62                  # σ: cosine edge threshold for the mirror graph (matches dreaming)
min_degree = 2                # a node needs this many σ-neighbours to be a graph "core"
bridge_clustering_max = 0.5   # local clustering coefficient <= this (degree>=2) => a bridge
centrality_top_k = 5          # how many hub claims the centrality interpreter emits
agreement_jaccard = 0.5       # support-set Jaccard >= this => interpreters corroborate one claim
# Structural interpreters (H4-H7, backed by core/complex/). Declared bounds, not magic (G7):
bridge_top_k = 5              # most-negative-curvature edges the bridge interpreter surfaces
hole_min_persistence = 0.15   # min H1 lifetime (cosine-distance units) for a "long-lived" hole
thread_min_persistence = 0.15 # min H1 lifetime (cosine-distance units) for a THREAD's carrying cycle
sbm_k_max = 8                 # model-selection cap for the SBM theme count (>= 1)

[selfmod]
# The self-modification loop (BUILD-SPEC §14, Phase 10 — the last + most privileged capability).
# Two fail-closed switches, both OFF by default:
#   `enabled`            — master switch for the WHOLE propose→approve→execute→validate→rollback
#                          loop. Off: nothing self-modifies, period.
#   `unattended_enabled` — separately gates the ONLY path that acts WITHOUT human approval (the
#                          §14 "safe levers"). Off even when `enabled` is on: every change needs a
#                          human at the gate. Turn this on only deliberately, per machine.
# The writable surface is knobs ONLY — the lever registry (ops/levers.py) holds bounded numeric
# config knobs and physically cannot express a code or infrastructure change. Tuned values are
# written to the machine-owned config/levers.toml overlay, never to your local.toml.
enabled = false
unattended_enabled = false
ledger_db = "data/selfmod_ledger.sqlite"   # durable SQLite propose/approve/validate ledger

[sandbox]
# Executed code is POWERLESS (Invariant 4, BUILD-SPEC §11): network-off, no vault mount,
# read-only rootfs + scratch tmpfs, dropped caps, non-root, CPU/mem/pids limits, wall-clock
# timeout. DATA can be piped IN (ExecSpec.inputs → /tmp/input/<name>, in-band on stdin, no host
# mount) so an agent can analyze a provided dataset and get results back — data in, data out.
#   runtime: "podman" (default, empirically verified) | "wasm" (pure-compute, needs a WASI
#            python.wasm at wasm_module) | "routing" (wasm for pure-compute python, else podman).
#   image:   the language image. For data analysis build the libs image (numpy/scipy/pandas/
#            scikit-learn/cryptography) — `scripts/build_sandbox_image.sh` — and point here, e.g.
#            via config/local.toml: image = "mind-palace-sandbox:latest". Default stays slim so a
#            fresh clone works with stdlib-only code.
runtime = "podman"
image = "python:3.12-slim"
wasm_module = ""             # path to a WASI python.wasm (enables runtime=wasm/routing; owner-placed)
timeout_s = 10               # wall-clock per execution
memory = "256m"
cpus = 1.0
pids_limit = 128
max_concurrency = 1          # one sandbox at a time — respect the RAM ceiling (Invariant 8)
warm_pool_size = 1           # warm containers kept ready to avoid cold start

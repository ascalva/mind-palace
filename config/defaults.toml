# Non-secret configuration ONLY. Secrets (tokens, keys) live in the macOS Keychain or
# environment and are never read from here, never committed, never passed to a model
# (Invariant 10, CONVENTIONS). Relative paths resolve against the repo root.

[ollama]
# The sealed core talks to a LOCAL Ollama over loopback only (BUILD-SPEC §5, §7); the
# egress guard permits this and blocks everything else.
host = "127.0.0.1"
port = 11434
default_keep_alive = "30m"   # seconds a worker stays warm after last use
request_timeout_s = 120

[resources]
# Apple Silicon M2 Max, 32 GB unified memory; ~20-24 GB usable after OS + working set
# (BUILD-SPEC §5). The loader refuses work that would breach this (Invariant 8). 24 is
# the hard upper ceiling: the stretch model deliberately consumes most of it and evicts
# the pinned model for its duration. `resident_gb` below is the weights footprint;
# KV-cache (bounded per role by num_ctx) is additional headroom, accounted as a
# refinement in a later phase.
usable_ram_gb = 24.0
max_resident_models = 2

[paths]
data_dir = "data"
telemetry_db = "data/telemetry.duckdb"
raw_store = "data/raw"            # content-addressed immutable raw notes (§8)
vector_store = "data/vectors.lance"  # LanceDB thought-graph vectors (derived, regenerable)

[vault]
# The SOURCE corpus the system ingests FROM — read-only, AUTHORED, never committed.
# `~` expands to $HOME. Point at a Logseq/Obsidian markdown vault, or export notes here.
# (§20.8: narrow `pattern`, or point `path` at a subgraph, to scope which notes ingest.)
path = "~/.mind-palace/vault"
pattern = "**/*.md"

[embedding]
# Embedding quality is load-bearing (retrieval, dreaming, matching) — owner chose the
# higher-quality tier. Dimension is read here so re-embedding from raw (§8) on a model
# change is a config edit, not a rewrite.
model = "qwen3-embedding:4b"
dim = 2560
# Qwen3-Embedding is instruction-aware on the QUERY side; documents embed plain.
query_instruction = "Given a question, retrieve the owner's notes relevant to it"

# --- Model lineup: two-slot discipline (BUILD-SPEC §5); §20.1 resolved 2026-06-25. ---
# Personas and per-call params are injected at REQUEST time via the Ollama API, never
# baked into a Modelfile (CONVENTIONS). `num_ctx` is the per-role load-time window,
# right-sized per role rather than the model's 256K max (BUILD-SPEC §13).

[[models]]
name = "qwen3.5:2b"          # Slot 1 — pinned, always warm: router + watchdog
tier = "router"              # default tag is the q8 build (~2.7 GB); the q4_K_M tag
pinned = true                # (~1.9 GB) is a later memory optimization if needed
resident_gb = 2.7
num_ctx = 8192

[[models]]
name = "qwen3.5:9b"          # Slot 2 — foreground RAG + fast conversational (voice)
tier = "routine"
pinned = false
resident_gb = 6.6
num_ctx = 16384

[[models]]
name = "qwen3.6:27b"         # Slot 2 — curation/dreaming/research synthesis (cron/idle)
tier = "synthesis"
pinned = false
resident_gb = 17.0
num_ctx = 32768

[[models]]
name = "qwen3.6:35b-a3b"     # Slot 2 — rare deep synthesis; EVICTS the pinned model
tier = "stretch"
pinned = false
resident_gb = 23.0
num_ctx = 32768
evicts_pinned = true

[interface]
# Zone B gateway <-> sealed core handoff (BUILD-SPEC §6, §12). The ONLY channel between the
# networked gateway and the core is this filesystem directory — never shared memory or
# imports (Invariant 2). The private default adapter is the local app over Tailscale;
# third-party adapters (e.g. WhatsApp) leak interactions and are opt-in (Invariant 11).
handoff_dir = "data/handoff"
default_adapter = "local"

[sandbox]
# Executed code is POWERLESS (Invariant 4, BUILD-SPEC §11): network-off, no vault mount,
# read-only rootfs + scratch tmpfs, dropped caps, non-root, CPU/mem/pids limits, wall-clock
# timeout. Default substrate is rootless Podman; wasmtime+Pyodide is the pure-compute path.
runtime = "podman"
image = "python:3.12-slim"   # default language image (per-language images in policy.RUNTIMES)
timeout_s = 10               # wall-clock per execution
memory = "256m"
cpus = 1.0
pids_limit = 128
max_concurrency = 1          # one sandbox at a time — respect the RAM ceiling (Invariant 8)
warm_pool_size = 1           # warm containers kept ready to avoid cold start

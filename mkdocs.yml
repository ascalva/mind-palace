site_name: Mind Palace
site_description: >-
  A local-first knowledge system that knows why it believes things — typed provenance,
  sealed core, attested acts. API documentation generated from the code itself.
site_url: https://ascalva.github.io/Mind-Palace/ # re-pointed from GitLab Pages (bp-017; parked-decision default, note D5 #4)
repo_url: https://github.com/ascalva/Mind-Palace
repo_name: Mind-Palace

# The site sources live in site/ — NOT docs/, which is the corpus artifact tree
# (design notes, plans, findings). The API pages are generated from docstrings via
# mkdocstrings' static analysis (griffe): the same Rosetta layer that bridges the
# corpus to the code renders the public documentation. One source, two consumers.
docs_dir: site

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: teal
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false          # source stays one click away in the repo; embedding
                                        # highlighted source for ~330 modules is what timed out
            docstring_style: google
            show_if_no_docstring: true
            members_order: source
            show_root_heading: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API:
    - core — the sealed kernel:
        - modules: api/core.md
        - core.attestation: api/core.attestation.md
        - core.complex: api/core.complex.md
        - core.curator: api/core.curator.md
        - core.dreaming: api/core.dreaming.md
        - core.factory: api/core.factory.md
        - core.ingest: api/core.ingest.md
        - core.librarian: api/core.librarian.md
        - core.kernel.matching: api/core.kernel.matching.md
        - core.models: api/core.models.md
        - core.research: api/core.research.md
        - core.sandbox: api/core.sandbox.md
        - core.stores: api/core.stores.md
        - core.typedshims: api/core.typedshims.md
        - core.verdict: api/core.verdict.md
    - ops — host orchestration:
        - modules: api/ops.md
        - ops.backup: api/ops.backup.md
        - ops.lifecycle: api/ops.lifecycle.md
    - scheduler — the supervisor:
        - modules: api/scheduler.md
    - agents — the ambassador tier:
        - modules: api/agents.md
        - agents.ambassador: api/agents.ambassador.md
    - edge — the networked zone:
        - modules: api/edge.md
        - edge.bridge: api/edge.bridge.md
        - edge.effectors: api/edge.effectors.md
        - edge.interface: api/edge.interface.md
    - config — the deployment surface:
        - modules: api/config.md
    - eval — gauges and golden sets:
        - modules: api/eval.md

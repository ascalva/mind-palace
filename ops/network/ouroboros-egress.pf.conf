# ops/network/ouroboros-egress.pf.conf — the core-egress pf anchor (dn-plane-principals §3.4).
#
# Makes non-negotiable #2 ("network and private data never share a component") a KERNEL FACT for
# the CORE plane: the `ouroboros` user (the reasoning daemon + the vault) gets ZERO off-host
# egress, enforced by the packet filter on the socket's effective uid — no import, no code path,
# no bug in a daemon component can cross it short of root or a kernel exploit. It composes with the
# other direction (edge ≠ ouroboros, vault is 0700 ouroboros → edge cannot read the corpus): the
# component with the data has no network, the component with the network has no data.
#
# ORDERING IS LOAD-BEARING. pf is first-match-wins for `quick` rules, so the loopback carve-out
# MUST precede the block: core legitimately speaks localhost to the resident Ollama model servers
# (127.0.0.1:11434, config/defaults.toml [ollama]) — "sealed" means zero OFF-HOST egress, not zero
# loopback. If the block came first, the daemon's model calls would be dropped and core would
# wedge. The pass on lo0 is quick so it wins for loopback; the block is quick so it wins for
# everything else the ouroboros uid tries to open. (The lo0 necessity is verified against the
# RUNNING daemon before this loads — runbook step: confirm core opens a 127.0.0.1 model socket.)
#
# SCOPE: this anchor names ONLY `ouroboros` (core). It does NOT touch `ouroboros-work` (the
# workflow plane keeps open dev egress — the API, git push, uv; parked in the note §5) nor
# `ouroboros-edge` (the network-facing plane). pf `user` matches the socket's effective uid in
# BOTH directions (out and listen), so this one block covers egress and any listening socket core
# might open off-loopback.
#
# INSTALL (OWNER-run, needs root — this file is INERT until loaded; the migration is owner-run,
# dn-plane-principals §3.5). It loads into a NAMED sub-anchor so it never flushes the system
# ruleset:
#   sudo pfctl -a mind-palace/ouroboros -f ops/network/ouroboros-egress.pf.conf
# and a loader line is added to /etc/pf.conf so it survives a reload / reboot:
#   anchor "mind-palace/ouroboros"
#   load anchor "mind-palace/ouroboros" from "/Users/ascalva/mind-palace/ops/network/ouroboros-egress.pf.conf"
# then reload the main ruleset:  sudo pfctl -f /etc/pf.conf   (and `sudo pfctl -e` if pf is off).
#
# VERIFY (owner):  sudo pfctl -a mind-palace/ouroboros -sr    # shows exactly the two rules below.
# Parse-check WITHOUT loading:  sudo pfctl -n -f ops/network/ouroboros-egress.pf.conf
#   NB pre-migration this parse REPORTS "unknown user ouroboros" because the account does not exist
#   yet — that is expected; run this parse-check only AFTER the `ouroboros` user is created. The
#   committed file's syntax + ordering are proven independently by tests/unit/test_plane_migration.py
#   (ordering by text; syntax via a resolvable-user substitution), so a broken anchor never ships.
#
# ROLLBACK (owner):  sudo pfctl -a mind-palace/ouroboros -F rules   # flush just this sub-anchor
#   (and remove the two /etc/pf.conf loader lines, then `sudo pfctl -f /etc/pf.conf`).

pass  out quick on lo0
block drop out quick proto { tcp udp } from any to any user ouroboros

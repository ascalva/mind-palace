workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /^chore\(release\):/ && $CI_COMMIT_BRANCH'
      when: never
    - when: always

variables:
  SECRET_DETECTION_ENABLED: "true"

include:
  - project: ascalva-projects/utils/pipeline-fragments
    ref: v1.3.6
    file:
      - .gitlab/stages.gitlab-ci.yml
      - .gitlab/rules.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: ascalva-projects/utils/pipeline-fragments
    ref: v1.3.6
    file: templates/semantic-release.gitlab-ci.yml

sast:
  stage: security-checks

secret_detection:
  stage: security-checks

# The deterministic ratchet in CI (owner rule 2026-07-11): ruff + import-firewall + the
# model-free pytest tier. Sized for the free-tier shared runners — ONE job, uv-cached,
# skipped entirely on docs-only pushes (`rules:changes`), interruptible so a newer push
# cancels a stale run. live/podman/needs_vault/needs_restic stay LOCAL by design: shared
# runners have no Ollama, no nested virt, no Vault, no restic repo (runbook §Verifying).
ratchet:
  stage: lint
  # 3.12, not 3.14: scikit-network's locked version ships linux wheels only for
  # cp311/cp312 (uv.lock); the slim runner can't build it from sdist. Local dev runs
  # 3.14 — CI validating the 3.12 floor is within requires-python >= 3.11.
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  interruptible: true
  variables:
    GIT_DEPTH: "1"
    UV_CACHE_DIR: .uv-cache
  cache:
    key:
      files: [uv.lock]
    paths: [.uv-cache]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        paths:
          - "core/**/*"
          - "agents/**/*"
          - "eval/**/*"
          - "ops/**/*"
          - "scheduler/**/*"
          - "scripts/**/*"
          - "tests/**/*"
          - "config/**/*"
          - ".claude/**/*"       # hook/skill python is repo code: repo-wide ruff covers it
          - "edge/**/*"
          - "cloud/**/*"
          - "pyproject.toml"
          - "uv.lock"
          - ".gitlab-ci.yml"
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends git  # slim image has no git; code-sensor tests + git_state shell out to it
  script:
    - uv sync --frozen --extra dev
    - uv run ruff check .
    - uv run python scripts/check_imports.py   # Invariant 2 static proof in CI (finding-0014)
    - uv run pytest -q -m 'not live and not podman and not needs_vault and not needs_restic'

# The vault axis in CI: a disposable dev-mode Vault as a service container proves the
# committed AppRole policies against a REAL server (tests/e2e/test_secrets_vault_live.py
# auto-skips without one — in CI it never skips). Scoped tighter than the ratchet: only
# auth-layer-relevant paths trigger it, so the budget cost is near zero in steady state.
vault-axis:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  interruptible: true
  services:
    - name: hashicorp/vault:latest
      alias: vault
  variables:
    GIT_DEPTH: "1"
    UV_CACHE_DIR: .uv-cache
    VAULT_DEV_ROOT_TOKEN_ID: "ci-root-disposable"
    VAULT_ADDR: "http://vault:8200"
    VAULT_TOKEN: "ci-root-disposable"
  cache:
    key:
      files: [uv.lock]
    paths: [.uv-cache]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        paths:
          - "core/**/*"
          - "ops/vault/**/*"
          - "tests/e2e/test_secrets_vault_live.py"
          - "pyproject.toml"
          - "uv.lock"
          - ".gitlab-ci.yml"
  script:
    - uv sync --frozen --extra dev
    - uv run pytest -q -m needs_vault

# GitLab Pages: code documentation generated from docstrings (owner rule 2026-07-11 —
# the Rosetta layer renders the public docs). uvx keeps the tooling OUT of the project
# env (no pyproject/lock churn); mkdocstrings uses griffe STATIC analysis, so the job
# installs zero project dependencies. Budget: ~1 min, only on doc-relevant changes.
pages:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  interruptible: true
  variables:
    GIT_DEPTH: "1"
    UV_CACHE_DIR: .uv-cache
  cache:
    key:
      files: [uv.lock]
    paths: [.uv-cache]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        paths:
          - "core/**/*"
          - "ops/**/*"
          - "scheduler/**/*"
          - "agents/**/*"
          - "edge/**/*"
          - "config/**/*"
          - "eval/**/*"
          - "site/**/*"
          - "mkdocs.yml"
          - "README.md"
          - ".gitlab-ci.yml"
  script:
    - uvx --with mkdocs-material --with "mkdocstrings[python]" mkdocs build --site-dir public
  artifacts:
    paths: [public]
